<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocMind — RAG Document Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface-2: #1e2230;
      --border: #2a2f3d;
      --accent: #7c6af7;
      --accent-dim: rgba(124,106,247,0.15);
      --accent-glow: rgba(124,106,247,0.35);
      --green: #3ecf8e;
      --green-dim: rgba(62,207,142,0.12);
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --text: #e8eaf0;
      --text-muted: #7a8099;
      --text-dim: #4a5070;
      --radius: 10px;
      --mono: 'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr;
      grid-template-rows: 56px 1fr;
    }

    /* ── NAV ── */
    nav {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      background: linear-gradient(135deg, #7c6af7, #a78bfa, #3ecf8e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .nav-tag {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* ── SIDEBAR ── */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    /* Upload Zone */
    #drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
    }

    #drop-zone:hover, #drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    #drop-zone .upload-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    #drop-zone p {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    #drop-zone strong {
      color: var(--accent);
    }

    #file-input { display: none; }

    /* Upload progress */
    #upload-status {
      display: none;
      font-size: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-family: var(--mono);
    }
    #upload-status.loading { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-glow); }
    #upload-status.success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
    #upload-status.error { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }

    .upload-progress-track {
      height: 3px;
      background: rgba(124,106,247,0.2);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .upload-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Document list */
    #doc-list { display: flex; flex-direction: column; gap: 6px; }

    .doc-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .doc-card:hover { border-color: var(--accent); }

    .doc-card.active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .doc-card .doc-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-card .doc-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* Model selector */
    .model-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .model-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      text-align: left;
    }

    .model-btn:hover { border-color: var(--accent); }
    .model-btn.active { border-color: var(--accent); background: var(--accent-dim); }

    .model-badge {
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: auto;
      font-weight: 500;
    }

    .badge-free { background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
    .badge-paid { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }

    .model-icon { font-size: 16px; }

    /* ── MAIN ── */
    main {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    /* Chat area */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
      text-align: center;
    }

    #empty-state .empty-icon { font-size: 48px; opacity: 0.4; }
    #empty-state h2 { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text-muted); font-weight: 700; }
    #empty-state p { font-size: 13px; line-height: 1.6; max-width: 320px; }

    /* Messages */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 780px;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.65;
      max-width: 640px;
    }

    .msg.user .msg-bubble {
      background: var(--accent-dim);
      border: 1px solid var(--accent-glow);
      color: var(--text);
    }

    .msg.assistant .msg-bubble {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .msg-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .provider-tag {
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 500;
    }

    .tag-qwen { background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
    .tag-claude { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-glow); }
    .tag-openai { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }

    /* Sources */
    .sources-toggle {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .sources-toggle:hover { border-color: var(--accent); color: var(--accent); }

    .sources-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
      max-width: 640px;
    }

    .sources-panel.open { display: flex; }

    .source-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .source-item .source-header {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 6px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .score-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 2px;
    }

    /* Escalation card */
    .escalation-card {
      background: var(--amber-dim);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 10px;
      padding: 14px 16px;
      max-width: 480px;
    }

    .escalation-card h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--amber);
      margin-bottom: 6px;
    }

    .escalation-card p {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .escalation-actions {
      display: flex;
      gap: 8px;
    }

    .esc-btn {
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .esc-btn-claude {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent-glow);
    }

    .esc-btn-claude:hover { background: var(--accent); color: white; }

    .esc-btn-openai {
      background: var(--amber-dim);
      color: var(--amber);
      border-color: rgba(245,158,11,0.4);
    }

    .esc-btn-openai:hover { background: var(--amber); color: white; }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: fit-content;
    }

    .typing span {
      width: 6px; height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Query input */
    #query-bar {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
    }

    #query-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: none;
      min-height: 48px;
      max-height: 120px;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #query-input:focus { border-color: var(--accent); }
    #query-input::placeholder { color: var(--text-dim); }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: #6a59e0; transform: scale(1.05); }
    #send-btn:disabled { background: var(--surface-2); color: var(--text-dim); cursor: not-allowed; transform: none; }

    .input-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      padding-bottom: 14px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo-dot"></div>
  <div class="logo">DocMind</div>
  <span class="nav-tag">RAG · Multi-LLM</span>
</nav>

<!-- SIDEBAR -->
<aside>
  <!-- Upload -->
  <div>
    <div class="section-label">Document</div>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📄</div>
      <p><strong>Click or drop a file</strong><br />PDF or TXT — up to 20 MB</p>
    </div>
    <input type="file" id="file-input" accept=".pdf,.txt" />
    <div id="upload-status"></div>
  </div>

  <!-- Loaded docs -->
  <div>
    <div class="section-label">Loaded Documents</div>
    <div id="doc-list">
      <div style="font-size:12px; color:var(--text-dim)">No documents yet</div>
    </div>
  </div>

  <!-- Model selector -->
  <div>
    <div class="section-label">Model</div>
    <div class="model-options">
      <button class="model-btn active" data-provider="auto" onclick="selectModel(this)">
        <span class="model-icon">⚡</span>
        <span>Auto (Qwen first)</span>
        <span class="model-badge badge-free">FREE</span>
      </button>
      <button class="model-btn" data-provider="claude" onclick="selectModel(this)">
        <span class="model-icon">🤖</span>
        <span>Claude Sonnet</span>
        <span class="model-badge badge-paid">PAID</span>
      </button>
      <button class="model-btn" data-provider="openai" onclick="selectModel(this)">
        <span class="model-icon">✨</span>
        <span>GPT-4o mini</span>
        <span class="model-badge badge-paid">PAID</span>
      </button>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main>
  <div id="chat-area">
    <div id="empty-state">
      <div class="empty-icon">🔍</div>
      <h2>Ask your document</h2>
      <p>Upload a PDF or TXT file on the left, then ask any question about its contents.</p>
    </div>
  </div>

  <div id="query-bar">
    <textarea
      id="query-input"
      placeholder="Ask a question about your document…"
      rows="1"
      onkeydown="handleKey(event)"
    ></textarea>
    <span class="input-hint">Enter ↵</span>
    <button id="send-btn" onclick="sendQuery()" disabled>➤</button>
  </div>
</main>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let currentDocId = null;
  let currentProvider = 'auto';
  let pendingEscalationQuery = null;

  // ── Upload ─────────────────────────────────────────────────────────────────
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f) uploadFile(f);
  });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });

  const STEP_LABEL = {
    extracting: 'Extracting text…',
    chunking:   'Chunking document…',
    embedding:  'Embedding vectors — this may take a moment…',
    storing:    'Storing vectors…',
  };

  async function uploadFile(file) {
    const status = document.getElementById('upload-status');
    status.style.display = 'block';
    status.className = 'loading';
    status.innerHTML = `
      <div class="upload-step-label">Uploading ${escHtml(file.name)}…</div>
      <div class="upload-progress-track">
        <div class="upload-progress-fill" style="width:0%"></div>
      </div>
    `;

    const labelEl = status.querySelector('.upload-step-label');
    const fillEl  = status.querySelector('.upload-progress-fill');

    const form = new FormData();
    form.append('file', file);

    try {
      const res = await fetch('/api/ingest', { method: 'POST', body: form });

      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.detail || 'Upload failed');
      }

      if (!res.body) throw new Error('Streaming not supported by this browser.');

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep any incomplete trailing line

        for (const line of lines) {
          if (!line.trim()) continue;
          let evt;
          try { evt = JSON.parse(line); } catch { continue; }

          if (evt.status === 'error') throw new Error(evt.message);

          if (evt.status === 'done') {
            status.className = 'success';
            status.textContent = `✓ Ready — ${evt.chunks} chunks indexed`;
            currentDocId = evt.doc_id;
            document.getElementById('send-btn').disabled = false;
            addDocToList(evt.doc_id, file.name, evt.chunks);
            clearEmptyState();
            return;
          }

          fillEl.style.width  = evt.progress + '%';
          labelEl.textContent = STEP_LABEL[evt.status] || evt.status;
        }
      }

      throw new Error('Upload stream ended without a completion event.');

    } catch (err) {
      status.className = 'error';
      status.textContent = `✗ ${err.message}`;
    }
  }

  function addDocToList(docId, filename, chunks) {
    const list = document.getElementById('doc-list');
    // Clear "no documents" text
    if (list.querySelector('div:not(.doc-card)')) list.innerHTML = '';

    const card = document.createElement('div');
    card.className = 'doc-card active';
    card.dataset.docId = docId;
    card.innerHTML = `
      <div class="doc-name" title="${filename}">${filename}</div>
      <div class="doc-meta">${chunks} chunks · id: ${docId}</div>
    `;
    card.onclick = () => {
      document.querySelectorAll('.doc-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      currentDocId = docId;
      document.getElementById('send-btn').disabled = false;
    };
    // Remove active from others
    document.querySelectorAll('.doc-card').forEach(c => c.classList.remove('active'));
    list.prepend(card);
  }

  // ── Model select ───────────────────────────────────────────────────────────
  function selectModel(btn) {
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentProvider = btn.dataset.provider;
  }

  // ── Query ──────────────────────────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuery();
    }
  }

  async function sendQuery(overrideProvider = null, overrideQuery = null) {
    const input = document.getElementById('query-input');
    const query = overrideQuery || input.value.trim();
    const provider = overrideProvider || currentProvider;

    if (!query || !currentDocId) return;

    if (!overrideQuery) input.value = '';
    autoResizeTextarea(input);

    appendUserMessage(query);
    const typingEl = appendTyping();

    try {
      const res = await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ doc_id: currentDocId, query, provider }),
      });

      const data = await res.json();
      typingEl.remove();

      if (!res.ok) {
        appendErrorMessage(data.detail || 'Something went wrong.');
        return;
      }

      if (data.escalated) {
        appendEscalationMessage(data, query);
      } else {
        appendAssistantMessage(data);
      }
    } catch (err) {
      typingEl.remove();
      appendErrorMessage(err.message);
    }
  }

  // ── Message rendering ──────────────────────────────────────────────────────
  function clearEmptyState() {
    const es = document.getElementById('empty-state');
    if (es) es.remove();
  }

  function appendUserMessage(text) {
    clearEmptyState();
    const chat = document.getElementById('chat-area');
    const msg = document.createElement('div');
    msg.className = 'msg user';
    msg.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div>`;
    chat.appendChild(msg);
    scrollBottom();
  }

  function appendTyping() {
    const chat = document.getElementById('chat-area');
    const el = document.createElement('div');
    el.className = 'msg assistant';
    el.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    chat.appendChild(el);
    scrollBottom();
    return el;
  }

  function appendAssistantMessage(data) {
    const chat = document.getElementById('chat-area');
    const msg = document.createElement('div');
    msg.className = 'msg assistant';

    const tagClass = `tag-${data.provider_used}`;
    const sourcesId = `sources-${Date.now()}`;

    msg.innerHTML = `
      <div class="msg-bubble">${escHtml(data.answer)}</div>
      <div class="msg-meta">
        <span class="provider-tag ${tagClass}">${data.provider_used}</span>
        <span>${data.model_used}</span>
        <button class="sources-toggle" onclick="toggleSources('${sourcesId}', this)">
          ${data.sources.length} sources ▾
        </button>
      </div>
      <div class="sources-panel" id="${sourcesId}">
        ${data.sources.map((s, i) => `
          <div class="source-item">
            <div class="source-header">
              <span>Page ${s.page}</span>
              <div class="score-bar"><div class="score-fill" style="width:${Math.round(s.score*100)}%"></div></div>
              <span>${(s.score * 100).toFixed(0)}%</span>
            </div>
            ${escHtml(s.chunk.substring(0, 300))}${s.chunk.length > 300 ? '…' : ''}
          </div>
        `).join('')}
      </div>
    `;
    chat.appendChild(msg);
    scrollBottom();
  }

  function appendEscalationMessage(data, query) {
    pendingEscalationQuery = query;
    const chat = document.getElementById('chat-area');
    const msg = document.createElement('div');
    msg.className = 'msg assistant';

    const reasonMap = {
      low_confidence: "Qwen answered but wasn't confident enough.",
      low_retrieval_score: "The document didn't contain closely matching content.",
    };
    const reason = reasonMap[data.escalation_reason] || data.escalation_reason;

    const preview = data.answer
      ? `<div class="msg-bubble" style="margin-bottom:8px;opacity:0.7">${escHtml(data.answer)}</div>`
      : '';

    msg.innerHTML = `
      ${preview}
      <div class="escalation-card">
        <h4>⚡ Upgrade to a stronger model?</h4>
        <p>${reason} Try Claude or GPT-4o mini for a better answer.</p>
        <div class="escalation-actions">
          <button class="esc-btn esc-btn-claude" onclick="escalate('claude')">Try Claude</button>
          <button class="esc-btn esc-btn-openai" onclick="escalate('openai')">Try GPT-4o mini</button>
        </div>
      </div>
    `;
    chat.appendChild(msg);
    scrollBottom();
  }

  function appendErrorMessage(text) {
    const chat = document.getElementById('chat-area');
    const msg = document.createElement('div');
    msg.className = 'msg assistant';
    msg.innerHTML = `
      <div class="msg-bubble" style="border-color:var(--red);background:var(--red-dim);color:var(--red)">
        ✗ ${escHtml(text)}
      </div>
    `;
    chat.appendChild(msg);
    scrollBottom();
  }

  function escalate(provider) {
    if (!pendingEscalationQuery) return;
    const q = pendingEscalationQuery;
    pendingEscalationQuery = null;
    sendQuery(provider, q);
  }

  function toggleSources(id, btn) {
    const panel = document.getElementById(id);
    panel.classList.toggle('open');
    btn.textContent = panel.classList.contains('open')
      ? `${panel.children.length} sources ▴`
      : `${panel.children.length} sources ▾`;
  }

  // ── Utils ──────────────────────────────────────────────────────────────────
  function scrollBottom() {
    const chat = document.getElementById('chat-area');
    chat.scrollTop = chat.scrollHeight;
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  const ta = document.getElementById('query-input');
  ta.addEventListener('input', () => autoResizeTextarea(ta));

  function autoResizeTextarea(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
